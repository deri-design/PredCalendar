<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Patch & Hero Roadmap</title>
    <!-- External Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #06080d; 
            --bg-grid: rgba(255, 255, 255, 0.03);
            --gold: #dcb63b; 
            --gold-glow: rgba(220, 182, 59, 0.3);
            --teal: #37a9a9; 
            --teal-glow: rgba(55, 169, 169, 0.3);
            --border: #1e2638;
            --cell-bg: #090e16; 
            --text-main: #c8d0e0;
            --text-dim: #6e798f;
            --header-bg: #0d131f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif;
            background-image: 
                linear-gradient(var(--bg-grid) 1px, transparent 1px), 
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 40px 40px; 
            padding: 2rem 1rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 1700px; margin: 0 auto; width: 100%; }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { 
            font-family: 'Orbitron'; 
            color: var(--gold); 
            letter-spacing: 6px; 
            font-size: 3.2rem; 
            text-shadow: 0 0 20px var(--gold-glow); 
            text-transform: uppercase;
        }
        .status-bar { 
            font-family: 'Orbitron'; 
            font-size: 0.75rem; 
            color: var(--teal); 
            margin-top: 12px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        /* --- LEGEND --- */
        .legend { display: flex; justify-content: center; gap: 2.5rem; margin-bottom: 2rem; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; }
        .legend-item { display: flex; align-items: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot.patch { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .dot.news { background: var(--teal); box-shadow: 0 0 10px var(--teal); }

        .divider {
            display: flex; align-items: center; color: var(--gold); font-family: 'Orbitron'; font-size: 0.8rem; 
            letter-spacing: 4px; margin-bottom: 2rem; font-weight: 900;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider::before { margin-right: 25px; }
        .divider::after { margin-left: 25px; }

        /* --- CALENDAR LAYOUT --- */
        .calendars-wrapper { display: flex; gap: 1.5rem; width: 100%; align-items: flex-start; }
        .section { flex: 1; min-width: 0; }

        .month-header { 
            font-family: 'Orbitron'; color: var(--gold); margin-bottom: 1.2rem; text-align: center; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-btn { 
            cursor: pointer; color: var(--text-main); padding: 6px 18px; border: 1px solid var(--border); 
            transition: 0.2s; user-select: none; font-size: 0.8rem; font-weight: bold;
        }
        .nav-btn:hover { background: #fff; color: #000; border-color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        
        .head-cell { background: var(--header-bg); padding: 14px; text-align: center; font-size: 0.7rem; color: #5d7599; font-family: 'Orbitron'; font-weight: bold; }
        
        .cell { 
            background: var(--cell-bg); 
            min-height: 160px; 
            max-height: 280px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: var(--border) transparent; 
        }
        .cell::-webkit-scrollbar { width: 4px; }
        .cell::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .today { outline: 1px solid var(--gold); background: rgba(220, 182, 59, 0.08); z-index: 2; }
        .num { font-family: 'Orbitron'; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 12px; font-weight: bold; }
        .active .num { color: var(--text-main); }
        .today .num { color: var(--gold); }

        /* --- EVENT CARDS --- */
        .event { 
            background: rgba(220, 182, 59, 0.08); 
            border-left: 3px solid var(--gold); 
            padding: 8px; 
            margin-bottom: 8px; 
            flex-shrink: 0;
            animation: slideIn 0.4s ease forwards;
        }
        .event.news { border-left-color: var(--teal); background: rgba(55, 169, 169, 0.08); }
        
        .event-title { font-weight: bold; color: var(--gold); margin-bottom: 6px; font-family: 'Orbitron'; font-size: 0.65rem; line-height: 1.3; }
        .event.news .event-title { color: var(--teal); }
        
        .event-desc { font-size: 0.7rem; color: #94a0b8; line-height: 1.4; margin-bottom: 8px; display: block; }
        
        .details-btn { 
            display: block; text-align: center; border: 1px solid rgba(255,255,255,0.15); 
            color: #fff; text-decoration: none; font-size: 0.6rem; padding: 4px; 
            font-family: 'Orbitron'; transition: 0.2s; font-weight: bold;
        }
        .details-btn:hover { background: #fff; color: #000; border-color: #fff; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

        /* RESPONSIVE */
        @media (max-width: 1300px) {
            .calendars-wrapper { flex-direction: column; gap: 4rem; }
            .header h1 { font-size: 2.2rem; }
            .cell { min-height: 120px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>PREDECESSOR LIVE ROADMAP</h1>
            <div id="status" class="status-bar">CONNECTING TO OMEDA API...</div>
        </header>

        <div class="legend">
            <div class="legend-item"><div class="dot patch"></div> PATCH NOTES</div>
            <div class="legend-item"><div class="dot news"></div> OFFICIAL NEWS / DEV DIARY</div>
        </div>

        <div class="divider">TIMELINE SYNCHRONIZER</div>

        <div class="calendars-wrapper">
            <!-- Left Month -->
            <div class="section">
                <div class="month-header">
                    <div class="nav-btn" id="prev-btn">&lt; PREV</div>
                    <span id="label-1"></span>
                    <div style="width:50px"></div>
                </div>
                <div class="grid" id="grid-1"></div>
            </div>

            <!-- Middle Month (Current Focus) -->
            <div class="section">
                <div class="month-header" style="justify-content: center; color: #fff;">
                    <span id="label-2"></span>
                </div>
                <div class="grid" id="grid-2"></div>
            </div>

            <!-- Right Month -->
            <div class="section">
                <div class="month-header">
                    <div style="width:50px"></div>
                    <span id="label-3"></span>
                    <div class="nav-btn" id="next-btn">NEXT &gt;</div>
                </div>
                <div class="grid" id="grid-3"></div>
            </div>
        </div>
    </div>

    <script>
        let eventData = [];
        const today = new Date();
        // viewDate tracks the start of the middle month
        let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);

        /**
         * Standardize date to YYYY-MM-DD
         */
        const formatDate = (y, m, d) => `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        /**
         * Load scraped data from events.json
         */
        async function init() {
            try {
                // Use cache-busting timestamp to bypass GitHub Pages caching
                const response = await fetch('./events.json?t=' + Date.now());
                const data = await response.json();
                
                eventData = Array.isArray(data) ? data : [];
                
                document.getElementById('status').innerText = `LIVE SYNC ACTIVE: ${eventData.length} EVENTS LOADED`;
                console.log("Verified Events Data:", eventData);
                renderAll();
            } catch (e) {
                console.error("Data Sync Failed:", e);
                document.getElementById('status').innerText = "OFFLINE MODE - RECONNECTING...";
                renderAll(); 
            }
        }

        /**
         * Render a specific month into a grid
         */
        function drawMonth(targetDate, gridId, labelId) {
            const grid = document.getElementById(gridId);
            const label = document.getElementById(labelId);
            const m = targetDate.getMonth(), y = targetDate.getFullYear();
            
            label.innerText = targetDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
            
            // Generate Weekday Headers
            grid.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="head-cell">${d}</div>`).join("");
            
            // Offset calculation (Monday-start)
            let firstDay = new Date(y, m, 1).getDay();
            firstDay = (firstDay === 0) ? 7 : firstDay;
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            // Pad Empty Start Cells
            for (let i = 1; i < firstDay; i++) grid.innerHTML += `<div class="cell"></div>`;
            
            // Populate Month Days
            for (let d = 1; d <= daysInMonth; d++) {
                const currentStr = formatDate(y, m + 1, d);
                // Exact match against events.json
                const matches = eventData.filter(e => e.date.trim() === currentStr);
                
                const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
                
                let eventsHtml = matches.map(e => `
                    <div class="event ${e.type === 'patch' ? '' : 'news'}">
                        <div class="event-title" title="${e.title}">${e.title}</div>
                        <span class="event-desc">${e.desc || 'Latest Update'}</span>
                        <a href="${e.url}" target="_blank" class="details-btn">DETAILS ↗</a>
                    </div>`).join("");
                
                grid.innerHTML += `
                    <div class="cell active ${isToday ? 'today' : ''}">
                        <div class="num">${d}</div>
                        ${eventsHtml}
                    </div>`;
            }

            // Pad Empty End Cells for Grid Alignment
            const totalCells = (firstDay - 1) + daysInMonth;
            const remaining = (totalCells % 7 === 0) ? 0 : 7 - (totalCells % 7);
            for (let j = 0; j < remaining; j++) grid.innerHTML += `<div class="cell"></div>`;
        }

        /**
         * Refresh all three calendar segments
         */
        function renderAll() {
            // Previous
            drawMonth(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1), 'grid-1', 'label-1');
            // Current (Focus)
            drawMonth(new Date(viewDate.getFullYear(), viewDate.getMonth(), 1), 'grid-2', 'label-2');
            // Next
            drawMonth(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1), 'grid-3', 'label-3');
        }

        // Navigation Bindings
        document.getElementById('prev-btn').addEventListener('click', () => {
            viewDate.setMonth(viewDate.getMonth() - 1);
            renderAll();
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            viewDate.setMonth(viewDate.getMonth() + 1);
            renderAll();
        });

        // Initialize from Now on
        init();
    </script>
</body>
</html>
