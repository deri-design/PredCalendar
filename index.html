<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Patch & Hero Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06080d; --bg-grid: rgba(255, 255, 255, 0.03);
            --gold: #dcb63b; --teal: #37a9a9; --red: #c73843;
            --text-main: #c8d0e0; --text-dim: #6e798f;
            --border-color: #1e2638; --cell-bg: #090e16; --cell-header: #0d131f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 40px 40px; color: var(--text-main); font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh;
        }
        .container { max-width: 1600px; width: 100%; display: flex; flex-direction: column; }
        .header { text-align: center; margin-bottom: 2rem; }
        .title { font-family: 'Orbitron'; font-size: 3rem; color: var(--gold); letter-spacing: 4px; }
        .legend { display: flex; justify-content: center; gap: 2rem; margin: 1rem 0; font-size: 0.8rem; font-weight: 600; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .calendars-wrapper { display: flex; gap: 1.2rem; width: 100%; }
        .calendar-section { flex: 1; min-width: 0; }
        .month-title { font-family: 'Orbitron'; color: var(--gold); font-size: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); }
        .calendar-header-cell { background: var(--cell-header); padding: 10px; text-align: center; font-size: 0.6rem; color: #5d7599; font-family: 'Orbitron'; }
        .calendar-cell { background: var(--cell-bg); min-height: 140px; padding: 8px; position: relative; }
        .date-num { font-family: 'Orbitron'; font-size: 0.8rem; color: #5d7599; margin-bottom: 8px; }
        .event-item { border-left: 3px solid var(--gold); background: rgba(255,255,255,0.03); padding: 5px; margin-bottom: 5px; }
        .event-title { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--gold); }
        .event-link { display: block; margin-top: 5px; font-size: 0.55rem; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); padding: 2px; text-align: center; }
        .event-link:hover { background: #fff; color: #000; }
        @media (max-width: 1200px) { .calendars-wrapper { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">PREDECESSOR LIVE ROADMAP</h1>
            <p id="status-text" style="color:var(--teal)">Syncing with official website...</p>
        </header>

        <div class="legend">
            <span><div class="dot" style="background:var(--gold)"></div> PATCH</span>
            <span><div class="dot" style="background:var(--teal)"></div> NEWS</span>
        </div>

        <div class="calendars-wrapper">
            <div class="calendar-section"><div class="month-title" id="label-prev"></div><div class="calendar-grid" id="grid-prev"></div></div>
            <div class="calendar-section"><div class="month-title" id="label-curr"></div><div class="calendar-grid" id="grid-curr"></div></div>
            <div class="calendar-section"><div class="month-title" id="label-next"></div><div class="calendar-grid" id="grid-next"></div></div>
        </div>
    </div>

    <script>
        let eventData = [];
        const realToday = new Date();

        async function init() {
            try {
                // FETCH THE SCRAPED DATA
                const response = await fetch('./events.json');
                eventData = await response.json();
                document.getElementById('status-text').innerText = "Live Sync Active";
            } catch (e) {
                document.getElementById('status-text').innerText = "Using Offline Data Cache";
            }
            renderAll();
        }

        function renderMonth(targetDate, gridId, labelId) {
            const grid = document.getElementById(gridId);
            const label = document.getElementById(labelId);
            const month = targetDate.getMonth(), year = targetDate.getFullYear();
            
            label.innerText = targetDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
            grid.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class='calendar-header-cell'>${d}</div>`).join("");
            
            let firstDay = new Date(year, month, 1).getDay();
            firstDay = (firstDay === 0) ? 7 : firstDay;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 1; i < firstDay; i++) grid.innerHTML += "<div class='calendar-cell'></div>";
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEvents = eventData.filter(e => e.date === dateStr);
                
                let html = `<div class="calendar-cell active"><div class="date-num">${d}</div>`;
                dayEvents.forEach(e => {
                    html += `<div class="event-item">
                        <div class="event-title">${e.title}</div>
                        <a href="${e.url}" target="_blank" class="event-link">DETAILS ↗</a>
                    </div>`;
                });
                grid.innerHTML += html + `</div>`;
            }
        }

        function renderAll() {
            renderMonth(new Date(realToday.getFullYear(), realToday.getMonth() - 1, 1), 'grid-prev', 'label-prev');
            renderMonth(new Date(realToday.getFullYear(), realToday.getMonth(), 1), 'grid-curr', 'label-curr');
            renderMonth(new Date(realToday.getFullYear(), realToday.getMonth() + 1, 1), 'grid-next', 'label-next');
        }

        init();
    </script>
</body>
</html>
