<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06080d; --bg-grid: rgba(255, 255, 255, 0.03);
            --gold: #dcb63b; --teal: #37a9a9; --border: #1e2638;
            --cell: #090e16; --text: #c8d0e0;
        }
        body {
            background: var(--bg-dark); color: var(--text); font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 40px 40px; padding: 2rem;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 4px; font-size: 3rem; }
        .calendars { display: flex; gap: 1.5rem; }
        .section { flex: 1; }
        .month-name { font-family: 'Orbitron'; color: var(--gold); margin-bottom: 1rem; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .head-cell { background: #0d131f; padding: 10px; text-align: center; font-size: 0.7rem; color: #5d7599; font-family: 'Orbitron'; }
        .cell { background: var(--cell); min-height: 140px; padding: 8px; }
        .today { outline: 1px solid var(--gold); background: rgba(220, 182, 59, 0.05); }
        .num { font-family: 'Orbitron'; font-size: 0.8rem; color: #5d7599; margin-bottom: 8px; }
        .active .num { color: var(--text); }
        .event { background: rgba(220, 182, 59, 0.1); border-left: 3px solid var(--gold); padding: 5px; margin-bottom: 5px; font-size: 0.7rem; }
        .event.news { border-left-color: var(--teal); background: rgba(55, 169, 169, 0.1); }
        .event-title { font-weight: bold; color: var(--gold); margin-bottom: 3px; font-family: 'Orbitron'; font-size: 0.6rem; }
        .event.news .event-title { color: var(--teal); }
        .btn { display: block; text-align: center; border: 1px solid rgba(255,255,255,0.2); color: #fff; text-decoration: none; font-size: 0.55rem; padding: 2px; margin-top: 4px; font-family: 'Orbitron'; }
        .btn:hover { background: #fff; color: #000; }
        @media (max-width: 1200px) { .calendars { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PREDECESSOR LIVE ROADMAP</h1>
            <p id="status" style="color:var(--teal)">Connecting to events.json...</p>
        </div>
        <div class="calendars">
            <div class="section"><h2 class="month-name" id="l1"></h2><div class="grid" id="g1"></div></div>
            <div class="section"><h2 class="month-name" id="l2"></h2><div class="grid" id="g2"></div></div>
            <div class="section"><h2 class="month-name" id="l3"></h2><div class="grid" id="g3"></div></div>
        </div>
    </div>

    <script>
        let eventData = [];
        const today = new Date();

        // Helper to format date as YYYY-MM-DD correctly
        const formatDate = (y, m, d) => `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        async function init() {
            try {
                // cache busting to ensure we get newest data
                const response = await fetch('./events.json?t=' + Date.now());
                eventData = await response.json();
                console.log("Data Loaded:", eventData);
                document.getElementById('status').innerText = `Sync Active (${eventData.length} events found)`;
            } catch (e) {
                console.error("Fetch error:", e);
                document.getElementById('status').innerText = "Error loading events.json";
            }
            render();
        }

        function draw(targetDate, gridId, labelId) {
            const grid = document.getElementById(gridId);
            const label = document.getElementById(labelId);
            const m = targetDate.getMonth(), y = targetDate.getFullYear();
            
            label.innerText = targetDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
            grid.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="head-cell">${d}</div>`).join("");
            
            let firstDay = new Date(y, m, 1).getDay();
            firstDay = (firstDay === 0) ? 7 : firstDay;
            const daysCount = new Date(y, m + 1, 0).getDate();

            for (let i = 1; i < firstDay; i++) grid.innerHTML += `<div class="cell"></div>`;
            
            for (let d = 1; d <= daysCount; d++) {
                const currentStr = formatDate(y, m + 1, d);
                // We trim and compare to avoid space issues
                const matches = eventData.filter(e => e.date.trim() === currentStr);
                
                const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
                
                let inner = `<div class="cell active ${isToday ? 'today' : ''}"><div class="num">${d}</div>`;
                matches.forEach(e => {
                    inner += `<div class="event ${e.type === 'patch' ? '' : 'news'}">
                        <div class="event-title">${e.title}</div>
                        <a href="${e.url}" target="_blank" class="btn">DETAILS ↗</a>
                    </div>`;
                });
                grid.innerHTML += inner + `</div>`;
            }
        }

        function render() {
            draw(new Date(today.getFullYear(), today.getMonth() - 1, 1), 'g1', 'l1');
            draw(new Date(today.getFullYear(), today.getMonth(), 1), 'g2', 'l2');
            draw(new Date(today.getFullYear(), today.getMonth() + 1, 1), 'g3', 'l3');
        }

        init();
    </script>
</body>
</html>
