name: Sync Twitch Drops
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run Twitch Scraper
        run: python twitch_drops.py
      - name: Push changes
        run: |
          git config --global user.name 'Twitch-Bot'
          git config --global user.email 'bot@twitch.tv'
          git add drops.json
          git diff --staged --quiet || (git commit -m "Update Twitch Drops" && git push origin main)
